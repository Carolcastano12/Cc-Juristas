<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM · CC Juristas y Asociados</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#b8924a;--gold-l:#e8d5b0;--cream:#faf7f2;
  --ink:#1a1614;--muted:#6b6460;--border:#e0d8cf;--white:#fff;
  --green:#16a34a;--green-bg:#f0fdf4;--green-b:#bbf7d0;
  --yellow:#b45309;--yellow-bg:#fffbeb;--yellow-b:#fcd34d;
  --red:#be123c;--red-bg:#fff1f2;--red-b:#fecaca;
  --blue:#1d4ed8;--blue-bg:#eff6ff;
  --purple:#7c3aed;--purple-bg:#faf5ff;
  --navy:#1a2744;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);font-size:14px;min-height:100vh}
.topbar{background:var(--ink);padding:.65rem 1.4rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;gap:1rem}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:#fff;flex-shrink:0}
.logo span{color:var(--gold)}
.logo-sub{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3);display:block}
.top-right{display:flex;gap:.4rem;align-items:center}
.tmb{padding:.35rem .8rem;border-radius:2px;font-size:.73rem;font-weight:500;cursor:pointer;border:1.5px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);background:transparent;font-family:'DM Sans',sans-serif;transition:all .2s}
.tmb.active{background:var(--gold);border-color:var(--gold);color:#fff}
.export-btn{padding:.35rem .8rem;border-radius:2px;font-size:.73rem;font-weight:500;cursor:pointer;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);background:transparent;font-family:'DM Sans',sans-serif}
.wrap{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 46px)}
.sb{background:var(--white);border-right:1px solid var(--border);padding:.9rem;display:flex;flex-direction:column;gap:.8rem;overflow-y:auto}
.sb-lbl{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:.25rem 0;border-bottom:1px solid var(--border);margin-bottom:.15rem}
.stat-big{background:var(--cream);border:1px solid var(--border);border-radius:3px;padding:.75rem}
.stat-big-n{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;line-height:1}
.stat-big-l{font-size:.65rem;color:var(--muted);margin-top:.1rem}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:.45rem}
.stat-sm{background:var(--cream);border:1px solid var(--border);border-radius:3px;padding:.55rem .65rem}
.stat-sm-n{font-size:1rem;font-weight:700}
.stat-sm-l{font-size:.6rem;color:var(--muted)}
.debt-box{background:var(--red-bg);border:1px solid var(--red-b);border-left:3px solid var(--red);padding:.6rem .8rem;border-radius:3px;font-size:.73rem;color:var(--red)}
.add-btn{background:var(--gold);color:#fff;border:none;border-radius:2px;padding:.65rem;width:100%;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:background .2s}
.add-btn:hover{background:#9e7a38}
.sp{display:flex;align-items:center;justify-content:space-between;padding:.35rem .55rem;border-radius:3px;cursor:pointer;border:1.5px solid transparent;margin-bottom:.22rem}
.sp:hover,.sp.af{background:var(--cream);border-color:var(--gold)}
.sp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sp-name{flex:1;margin-left:.5rem;font-size:.74rem;font-weight:500}
.sp-n{font-size:.62rem;background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:.05rem .38rem;color:var(--muted)}
.main{padding:1.1rem;overflow-y:auto;background:var(--cream)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;flex-wrap:wrap;gap:.6rem}
.mh-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600}
.mh-right{display:flex;gap:.5rem;align-items:center}
.srch{display:flex;align-items:center;gap:.35rem;background:var(--white);border:1.5px solid var(--border);border-radius:2px;padding:.35rem .65rem}
.srch input{border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:.8rem;width:160px;background:transparent;color:var(--ink)}
.vbtn{padding:.3rem .5rem;border:1.5px solid var(--border);border-radius:2px;background:transparent;cursor:pointer;font-size:.75rem;color:var(--muted)}
.vbtn.active{background:var(--ink);border-color:var(--ink);color:#fff}
.stabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1rem;background:var(--white);border-radius:3px 3px 0 0;padding:0 .5rem}
.stab{padding:.65rem 1rem;font-size:.75rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent}
.stab.active{color:var(--gold);border-bottom-color:var(--gold)}
.kanban{display:flex;gap:.85rem;overflow-x:auto;padding-bottom:.5rem}
.kcol{min-width:210px;max-width:210px;flex-shrink:0}
.kcol-hd{display:flex;align-items:center;gap:.4rem;padding:.5rem .65rem;border-radius:3px;margin-bottom:.65rem}
.kcol-title{font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.kcol-n{font-size:.65rem;border-radius:8px;padding:.06rem .4rem;font-weight:700}
.kcol-cards{display:flex;flex-direction:column;gap:.55rem;min-height:50px}
.empty-col{text-align:center;padding:1rem .5rem;font-size:.72rem;color:var(--muted);border:1.5px dashed var(--border);border-radius:3px}
.kcard{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:.8rem;cursor:pointer;transition:box-shadow .2s,transform .15s;position:relative}
.kcard:hover{box-shadow:0 3px 10px rgba(0,0,0,.07);transform:translateY(-1px)}
.kcard-name{font-size:.84rem;font-weight:600;margin-bottom:.3rem}
.kcard-svc{font-size:.7rem;color:var(--muted);margin-bottom:.45rem;line-height:1.4}
.kcard-meta{display:flex;justify-content:space-between;align-items:center;font-size:.63rem;color:var(--muted)}
.kcard-btns{display:flex;gap:.3rem;margin-top:.55rem;padding-top:.55rem;border-top:1px solid var(--border)}
.kb{font-size:.63rem;padding:.22rem .48rem;border-radius:2px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif}
.kb:hover{border-color:var(--gold);color:var(--gold)}
.kb.p{background:var(--gold);color:#fff;border-color:var(--gold)}
.kb.p:hover{background:#9e7a38}
.urg-badge{position:absolute;top:.45rem;right:.45rem;font-size:.57rem;background:var(--red-bg);color:var(--red);border-radius:2px;padding:.06rem .32rem;font-weight:700}
.hbadge{font-size:.6rem;border-radius:2px;padding:.06rem .38rem;font-weight:600;display:inline-block;margin-bottom:.3rem}
.hok{background:var(--green-bg);color:var(--green)}
.hdebt{background:var(--red-bg);color:var(--red)}
.hpart{background:var(--yellow-bg);color:var(--yellow)}
.ltable{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.ltable th{font-size:.61rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.6rem .85rem;text-align:left;background:var(--cream);border-bottom:1px solid var(--border)}
.ltable td{font-size:.77rem;padding:.62rem .85rem;border-bottom:1px solid var(--border);vertical-align:middle}
.ltable tr:last-child td{border-bottom:none}
.ltable tr:hover td{background:#fffbf5;cursor:pointer}
.dp{position:fixed;right:0;top:46px;bottom:0;width:440px;background:var(--white);border-left:1px solid var(--border);z-index:150;transform:translateX(100%);transition:transform .25s;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
.dp.open{transform:translateX(0)}
.dp-hd{padding:1rem 1.2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white);z-index:1}
.dp-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600}
.dp-close{background:none;border:none;font-size:.95rem;cursor:pointer;color:var(--muted);float:right;margin-top:2px}
.dp-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--cream)}
.dp-tab{flex:1;padding:.5rem .3rem;font-size:.7rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif}
.dp-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:var(--white)}
.dp-body{padding:1rem 1.2rem}
.dps{margin-bottom:1.2rem}
.dps-title{font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:.6rem;padding-bottom:.3rem;border-bottom:1px solid var(--border)}
.irow{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.78rem}
.irow:last-child{border-bottom:none}
.ir-l{color:var(--muted)}
.ir-v{font-weight:500;text-align:right;max-width:220px}
.sbrow{display:flex;gap:.35rem;flex-wrap:wrap}
.sbt{padding:.32rem .6rem;border-radius:2px;border:1.5px solid var(--border);font-size:.68rem;font-weight:500;cursor:pointer;background:transparent;font-family:'DM Sans',sans-serif;color:var(--muted)}
.sbt.cur{background:var(--gold);border-color:var(--gold);color:#fff}
.sbt:hover:not(.cur){border-color:var(--gold);color:var(--gold)}
.ck{display:flex;align-items:center;gap:.55rem;padding:.4rem .62rem;border-radius:2px;font-size:.77rem;border:1px solid var(--border);background:var(--cream);margin-bottom:.28rem}
.ck.done{background:var(--green-bg);border-color:var(--green-b);color:var(--green);text-decoration:line-through}
.ck input[type=checkbox]{accent-color:var(--green);width:13px;height:13px;flex-shrink:0}
.prog-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:.7rem}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
.ps-item{display:flex;align-items:flex-start;gap:.6rem;padding:.55rem .75rem;border-radius:3px;border:1.5px solid var(--border);background:var(--cream);margin-bottom:.3rem;cursor:pointer;font-size:.77rem;transition:all .2s}
.ps-item.done{background:var(--green-bg);border-color:var(--green-b)}
.ps-item.cur{background:var(--yellow-bg);border-color:var(--yellow-b);font-weight:600}
.ps-circle{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.58rem;margin-top:1px}
.ps-item.done .ps-circle{background:var(--green);border-color:var(--green);color:#fff}
.ps-item.cur .ps-circle{background:var(--yellow);border-color:var(--yellow);color:#fff}
.mini-inp{width:100%;padding:.45rem .7rem;border:1.5px solid var(--border);border-radius:2px;font-family:'DM Sans',sans-serif;font-size:.77rem;background:var(--cream);color:var(--ink);outline:none;margin-bottom:.4rem}
.mini-inp:focus{border-color:var(--gold)}
.mini-btn{padding:.42rem .75rem;background:var(--gold);color:#fff;border:none;border-radius:2px;font-size:.73rem;cursor:pointer;font-family:'DM Sans',sans-serif}
.mini-btn:hover{background:#9e7a38}
.tl-item{display:flex;gap:.55rem;margin-bottom:.5rem}
.tl-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:4px}
.tl-txt{font-size:.72rem;color:var(--muted);line-height:1.5}
.tl-date{font-size:.62rem;color:var(--border);display:block}
.notes-ta{width:100%;padding:.6rem;border:1.5px solid var(--border);border-radius:2px;font-family:'DM Sans',sans-serif;font-size:.77rem;resize:vertical;min-height:80px;background:var(--cream);outline:none;color:var(--ink)}
.notes-ta:focus{border-color:var(--gold)}
.honor-alert{border-radius:3px;padding:.6rem .85rem;font-size:.77rem;margin-bottom:.85rem;display:flex;align-items:center;gap:.6rem;font-weight:500}
.ha-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.ha-debt{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.ha-warn{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-b)}
.honor-sum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.45rem;margin-bottom:.85rem}
.hs{border-radius:3px;padding:.65rem;text-align:center;border:1px solid var(--border)}
.hs-n{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600}
.hs-l{font-size:.62rem;margin-top:.1rem}
.hprog{height:6px;background:var(--border);border-radius:3px;margin-bottom:.5rem;overflow:hidden}
.hprog-fill{height:100%;border-radius:3px;transition:width .4s}
.hprog-label{display:flex;justify-content:space-between;font-size:.68rem;color:var(--muted);margin-bottom:.5rem}
.tipo-toggle{display:flex;gap:.4rem;margin-bottom:.85rem}
.tipo-btn{flex:1;padding:.45rem;border-radius:2px;border:1.5px solid var(--border);font-size:.72rem;font-weight:500;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;text-align:center}
.tipo-btn.active{background:var(--gold);border-color:var(--gold);color:#fff}
.contract-block{background:var(--cream);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:3px;padding:.7rem .85rem;margin-bottom:.85rem;font-size:.77rem}
.contract-block strong{display:block;font-size:.82rem;margin-bottom:.35rem;color:var(--ink)}
.mov-list{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.75rem}
.mov-item{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;border-radius:3px;border:1px solid var(--border);background:var(--cream);font-size:.77rem}
.mov-concept{flex:1;font-weight:500}
.mov-date{font-size:.65rem;color:var(--muted);margin-top:.1rem}
.mov-amount{font-weight:700;font-size:.85rem;white-space:nowrap}
.mov-status{font-size:.62rem;font-weight:600;padding:.12rem .45rem;border-radius:2px;white-space:nowrap}
.ms-paid{background:var(--green-bg);color:var(--green)}
.ms-unpaid{background:var(--red-bg);color:var(--red)}
.ms-partial{background:var(--yellow-bg);color:var(--yellow)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:.8rem;padding:2px;flex-shrink:0}
.del-btn:hover{color:var(--red)}
.add-mov-form{background:var(--cream);border:1px solid var(--border);border-radius:3px;padding:.8rem}
.form-grid{display:grid;grid-template-columns:1fr 110px 120px 100px;gap:.5rem;margin-bottom:.5rem;align-items:end}
.fg label{font-size:.62rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.25rem}
.fg input,.fg select{width:100%;padding:.5rem .65rem;border:1.5px solid var(--border);border-radius:2px;font-family:'DM Sans',sans-serif;font-size:.77rem;background:var(--white);outline:none;color:var(--ink)}
.fg input:focus,.fg select:focus{border-color:var(--gold)}
/* PIN badge */
.pin-badge{display:inline-flex;align-items:center;gap:.4rem;background:var(--navy);color:var(--gold-l);padding:.3rem .7rem;border-radius:3px;font-size:.72rem;font-weight:700;letter-spacing:.08em;margin-top:.4rem}
.mo-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem}
.mo-overlay.hidden{display:none}
.modal{background:var(--white);border-radius:4px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hd{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.3rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white);z-index:1}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600}
.modal-body{padding:1.3rem}
.ms-title{font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:.65rem;padding-bottom:.32rem;border-bottom:1px solid var(--border);margin-top:1.1rem}
.ms-title:first-child{margin-top:0}
.mfr{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.mfr.one{grid-template-columns:1fr}
.mfg label{font-size:.63rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.25rem}
.mfg input,.mfg select,.mfg textarea{width:100%;padding:.62rem .78rem;border:1.5px solid var(--border);border-radius:2px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--ink);background:var(--cream);outline:none;transition:border-color .2s}
.mfg input:focus,.mfg select:focus,.mfg textarea:focus{border-color:var(--gold)}
.mfg textarea{resize:vertical;min-height:65px}
.modal-ft{padding:.85rem 1.3rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.55rem;position:sticky;bottom:0;background:var(--white)}
.btn-c{padding:.55rem 1rem;border:1.5px solid var(--border);border-radius:2px;background:transparent;font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;color:var(--muted)}
.btn-s{padding:.55rem 1.2rem;border:none;border-radius:2px;background:var(--gold);color:#fff;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer}
.btn-s:hover{background:#9e7a38}
.badge{font-size:.6rem;font-weight:600;padding:.13rem .48rem;border-radius:2px}
@media(max-width:860px){.wrap{grid-template-columns:1fr}.sb{display:none}.dp{width:100%}}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="logo">CC Juristas <span>&</span> Asociados</div>
    <span class="logo-sub">Sistema de seguimiento · Carol Castaño</span>
  </div>
  <div class="top-right">
    <button class="tmb active" onclick="switchTab('derecho',this)">⚖️ Derecho</button>
    <button class="tmb" onclick="switchTab('internacional',this)">🇺🇸 Internacional</button>
    <button class="export-btn" onclick="exportExcel()">📥 Exportar</button>
  </div>
</div>
<div class="wrap">
  <aside class="sb">
    <button class="add-btn" onclick="openModal()">+ Nuevo cliente</button>
    <div>
      <div class="sb-lbl">Resumen</div>
      <div class="stat-big" style="margin-bottom:.45rem"><div class="stat-big-n" id="totalC">0</div><div class="stat-big-l">Clientes activos</div></div>
      <div class="stat-row">
        <div class="stat-sm"><div class="stat-sm-n" id="urgC" style="color:var(--red)">0</div><div class="stat-sm-l">Urgentes</div></div>
        <div class="stat-sm"><div class="stat-sm-n" id="closedC" style="color:var(--green)">0</div><div class="stat-sm-l">Cerrados</div></div>
      </div>
    </div>
    <div id="debtAlert" style="display:none" class="debt-box"></div>
    <div><div class="sb-lbl">Filtrar por etapa</div><div id="stageList"></div></div>
  </aside>
  <main class="main">
    <div class="mh">
      <div class="mh-title" id="mainTitle">⚖️ Casos de Derecho</div>
      <div class="mh-right">
        <div class="srch">🔍<input type="text" placeholder="Buscar..." id="searchInput" oninput="renderBoard()"/></div>
        <button class="vbtn active" id="kanbanBtn" onclick="setView('kanban')">▦</button>
        <button class="vbtn" id="listBtn" onclick="setView('lista')">☰</button>
      </div>
    </div>
    <div class="stabs">
      <button class="stab active" onclick="setSection('nuevos',this)">Nuevos clientes</button>
      <button class="stab" onclick="setSection('activos',this)">Procesos activos</button>
      <button class="stab" onclick="setSection('todos',this)">Todos</button>
    </div>
    <div id="kanbanView"><div class="kanban" id="kanbanBoard"></div></div>
    <div id="listView" style="display:none">
      <table class="ltable"><thead><tr><th>Cliente</th><th>Servicio</th><th>Etapa</th><th>Honorarios</th><th>PIN Portal</th><th>Prioridad</th><th></th></tr></thead>
      <tbody id="listBody"></tbody></table>
    </div>
  </main>
</div>

<!-- DETAIL -->
<div class="dp" id="dp">
  <div class="dp-hd">
    <button class="dp-close" onclick="closeDetail()">✕</button>
    <div class="dp-name" id="dp-name">—</div>
    <div id="dp-badge" style="margin-top:.3rem"></div>
  </div>
  <div class="dp-tabs">
    <button class="dp-tab active" onclick="dpTab('info',this)">📋 Info</button>
    <button class="dp-tab" onclick="dpTab('proceso',this)">⚖️ Proceso</button>
    <button class="dp-tab" onclick="dpTab('honorarios',this)">💰 Honorarios</button>
    <button class="dp-tab" onclick="dpTab('notas',this)">📝 Notas</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>

<!-- MODAL -->
<div class="mo-overlay hidden" id="mo">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="modalTitle">Nuevo cliente</div>
      <button class="btn-c" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="ms-title">Datos personales</div>

let currentTab='derecho',currentView='kanban',currentSection='nuevos',detailId=null,editingId=null,stageFilter=null,currentDpTab='info';
let clients=JSON.parse(localStorage.getItem('ccj_crm_v4')||'[]');

const save=()=>localStorage.setItem('ccj_crm_v4',JSON.stringify(clients));
const tabC=()=>clients.filter(c=>c.tab===currentTab);
const fmt=n=>'$'+Math.round(Number(n||0)).toLocaleString('es-CO');
const today=()=>new Date().toISOString().split('T')[0];
const todayLocal=()=>new Date().toLocaleDateString('es-CO');
const genPIN=()=>Math.random().toString(36).substring(2,8).toUpperCase();

// ── EXPORT ──────────────────────────────────────────────
function exportExcel(){
  const sep=';';
  let rows=[];
  rows.push(['CC JURISTAS Y ASOCIADOS — REPORTE DE CLIENTES']);
  rows.push(['Generado el '+todayLocal()]);
  rows.push([]);
  ['derecho','internacional'].forEach(tabKey=>{
    const tc=clients.filter(c=>c.tab===tabKey);
    if(!tc.length)return;
    rows.push([tabKey==='derecho'?'CASOS DE DERECHO':'EXPANSIÓN USA']);
    rows.push(['Nombre','Cédula','PIN Portal','Servicio','Etapa','Prioridad','WhatsApp','Correo','País','Fecha','Total honorarios','Total pagado','Pendiente','Forma pago']);
    tc.forEach(c=>{
      const hs=c.honorarios||[];
      const total=Number(c.totalHonorarios||0);
      const paid=hs.filter(h=>h.status==='paid').reduce((a,h)=>a+Number(h.amount||0),0);
      const partial=hs.filter(h=>h.status==='partial').reduce((a,h)=>a+Number(h.amount||0),0);
      const pendiente=Math.max(0,total-(paid+partial));
      const s=TABS[c.tab].stages.find(s=>s.id===c.etapa);
      rows.push([c.nombre,c.cedula||'',c.pin||'',c.servicio||'',s?.label||c.etapa,c.prioridad||'',c.wa||'',c.email||'',c.pais||'',c.fecha||'',total,paid+partial,pendiente,c.formaPago||'']);
    });
    rows.push([]);
  });
  rows.push(['HONORARIOS PENDIENTES']);
  rows.push(['Cliente','Concepto','Fecha','Valor','Estado']);
  clients.forEach(c=>(c.honorarios||[]).forEach(h=>rows.push([c.nombre,h.concept,h.fecha||'',Number(h.amount||0),h.status==='paid'?'Pagado':h.status==='partial'?'Abono':'Pendiente'])));
  const csv=rows.map(r=>r.map(v=>{const s=String(v??'');return/[;\n"]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}).join(sep)).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='CC_Juristas_'+today()+'.csv';a.click();
}

// ── SIDEBAR ──────────────────────────────────────────────
function renderSidebar(){
  const tc=tabC();
  const active=tc.filter(c=>!['cerrado','completado','perdido'].includes(c.etapa));
  document.getElementById('totalC').textContent=active.length;
  document.getElementById('urgC').textContent=tc.filter(c=>c.prioridad==='urgente').length;
  document.getElementById('closedC').textContent=tc.filter(c=>['cerrado','completado'].includes(c.etapa)).length;
  let debt=0;tc.forEach(c=>{const hs=c.honorarios||[];const total=Number(c.totalHonorarios||0);const paid=hs.filter(h=>h.status==='paid').reduce((a,h)=>a+Number(h.amount||0),0);const partial=hs.filter(h=>h.status==='partial').reduce((a,h)=>a+Number(h.amount||0),0);debt+=Math.max(0,total-paid-partial)});
  const da=document.getElementById('debtAlert');
  da.style.display=debt>0?'block':'none';
  if(debt>0)da.innerHTML='<strong style="display:block;margin-bottom:.2rem">💰 Honorarios pendientes</strong>Total por cobrar: '+fmt(debt);
  document.getElementById('stageList').innerHTML=
    '<div class="sp '+(stageFilter===null?'af':'')+'" onclick="filterStage(null,this)"><div class="sp-dot" style="background:var(--muted)"></div><div class="sp-name">Todos</div><div class="sp-n">'+tc.length+'</div></div>'+
    TABS[currentTab].stages.map(s=>{const n=tc.filter(c=>c.etapa===s.id).length;return'<div class="sp '+(stageFilter===s.id?'af':'')+'" onclick="filterStage(\''+s.id+'\',this)"><div class="sp-dot" style="background:'+s.color+'"></div><div class="sp-name">'+s.label+'</div><div class="sp-n">'+n+'</div></div>'}).join('');
}

function filterStage(id,el){stageFilter=id;document.querySelectorAll('.sp').forEach(e=>e.classList.remove('af'));el.classList.add('af');renderBoard()}
function setView(v){currentView=v;document.getElementById('kanbanView').style.display=v==='kanban'?'block':'none';document.getElementById('listView').style.display=v==='lista'?'block':'none';document.getElementById('kanbanBtn').classList.toggle('active',v==='kanban');document.getElementById('listBtn').classList.toggle('active',v==='lista');renderBoard()}
function setSection(s,btn){currentSection=s;stageFilter=null;document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderBoard()}
function switchTab(tab,btn){currentTab=tab;stageFilter=null;document.querySelectorAll('.tmb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('mainTitle').textContent=TABS[tab].label;closeDetail();renderSidebar();renderBoard()}

function hbadge(c){
  const hs=c.honorarios||[];const total=Number(c.totalHonorarios||0);
  const paid=hs.filter(h=>h.status==='paid').reduce((a,h)=>a+Number(h.amount||0),0);
  const partial=hs.filter(h=>h.status==='partial').reduce((a,h)=>a+Number(h.amount||0),0);
  const pending=Math.max(0,total-paid-partial);
  if(!total&&!hs.length)return'';
  if(pending===0&&total>0)return'<span class="hbadge hok">✓ Al día</span>';
  if(pending>0)return'<span class="hbadge hdebt">Debe '+fmt(pending)+'</span>';
  return'<span class="hbadge hpart">Parcial</span>';
}

function renderBoard(){
  const cfg=TABS[currentTab],q=document.getElementById('searchInput').value.toLowerCase();
  let tc=tabC().filter(c=>!q||c.nombre.toLowerCase().includes(q)||(c.servicio||'').toLowerCase().includes(q));
  let stages=cfg.stages;
  if(stageFilter){tc=tc.filter(c=>c.etapa===stageFilter);}
  else if(currentSection==='nuevos'){stages=cfg.stages.filter(s=>cfg.newStages.includes(s.id));tc=tc.filter(c=>cfg.newStages.includes(c.etapa));}
  else if(currentSection==='activos'){stages=cfg.stages.filter(s=>cfg.activeStages.includes(s.id));tc=tc.filter(c=>cfg.activeStages.includes(c.etapa));}
  if(currentView==='kanban'){
    document.getElementById('kanbanBoard').innerHTML=stages.map(s=>{
      const cards=tc.filter(c=>c.etapa===s.id);
      return'<div class="kcol"><div class="kcol-hd" style="background:'+s.bg+'"><div style="width:7px;height:7px;border-radius:50%;background:'+s.color+'"></div><div class="kcol-title" style="color:'+s.color+'">'+s.label+'</div><div class="kcol-n" style="background:'+s.color+'22;color:'+s.color+'">'+cards.length+'</div></div><div class="kcol-cards">'+(cards.length?cards.map(c=>cardHTML(c,s)).join(''):'<div class="empty-col">Sin clientes</div>')+'</div></div>';
    }).join('');
  } else {
    document.getElementById('listBody').innerHTML=tc.length?tc.map(c=>{
      const s=cfg.stages.find(s=>s.id===c.etapa);
      return'<tr onclick="openDetail('+c.id+')"><td><strong>'+c.nombre+'</strong>'+(c.urgencia?'<br><span style="font-size:.63rem;color:var(--muted)">'+c.urgencia+'</span>':'')+'</td><td style="color:var(--muted)">'+(c.servicio||'—')+'</td><td><span class="badge" style="background:'+s?.bg+';color:'+s?.color+'">'+s?.label+'</span></td><td>'+(hbadge(c)||'—')+'</td><td><span class="pin-badge">🔑 '+(c.pin||'—')+'</span></td><td>'+(c.prioridad==='urgente'?'🔴':c.prioridad==='alta'?'🟡':'🟢')+'</td><td><button class="kb p" onclick="event.stopPropagation();openDetail('+c.id+')">Ver →</button></td></tr>';
    }).join(''):'<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:1.5rem">Sin clientes en esta sección</td></tr>';
  }
  renderSidebar();
}

function cardHTML(c,s){
  return'<div class="kcard" onclick="openDetail('+c.id+')">'+(c.prioridad==='urgente'?'<div class="urg-badge">URGENTE</div>':'')+'<div class="kcard-name">'+c.nombre+'</div><div class="kcard-svc">'+(c.servicio||'Sin servicio')+(c.pais?'<br><small>📍 '+c.pais+'</small>':'')+'</div>'+(hbadge(c)?'<div>'+hbadge(c)+'</div>':'')+'<div class="kcard-meta"><span>'+(c.fecha||'')+'</span><span style="width:6px;height:6px;border-radius:50%;display:inline-block;background:'+(c.prioridad==='urgente'?'#dc2626':c.prioridad==='alta'?'#d97706':'#22c55e')+'"></span></div><div class="kcard-btns"><button class="kb" onclick="event.stopPropagation();doWA('+c.id+')">💬 WA</button><button class="kb p" onclick="event.stopPropagation();openDetail('+c.id+')">Ver caso →</button></div></div>';
}
function doWA(id){const c=clients.find(x=>x.id===id);if(c?.wa)window.open('https://wa.me/'+c.wa.replace(/\D/g,''),'_blank')}

// ── DETAIL ────────────────────────────────────────────────
function openDetail(id){
  detailId=id;
  document.querySelectorAll('.dp-tab').forEach((b,i)=>b.classList.toggle('active',i===0));
  currentDpTab='info';
  document.getElementById('dp').classList.add('open');
  renderDetail();
}
function closeDetail(){document.getElementById('dp').classList.remove('open');detailId=null}
function dpTab(t,btn){currentDpTab=t;document.querySelectorAll('.dp-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderDetail()}

function renderDetail(){
  const c=clients.find(x=>x.id===detailId);if(!c)return;
  const cfg=TABS[c.tab],s=cfg.stages.find(s=>s.id===c.etapa);
  document.getElementById('dp-name').textContent=c.nombre;
  document.getElementById('dp-badge').innerHTML='<span class="badge" style="background:'+s?.bg+';color:'+s?.color+'">'+s?.label+'</span>'+(c.prioridad==='urgente'?' <span class="badge" style="background:var(--red-bg);color:var(--red)">🔴 URGENTE</span>':'');
  const body=document.getElementById('dp-body');
  if(currentDpTab==='info') body.innerHTML=renderInfo(c,cfg);
  else if(currentDpTab==='proceso') body.innerHTML=renderProceso(c,cfg);
  else if(currentDpTab==='honorarios') body.innerHTML=renderHonorarios(c);
  else body.innerHTML=renderNotas(c);
  bindDP(c,cfg);
}

  const tasks=cfg.checklists[c.etapa]||[],done=c.doneTasks||[],prog=tasks.length?Math.round(done.length/tasks.length*100):0;

    c.email&&'<div class="irow"><span class="ir-l">Correo</span><span class="ir-v">'+c.email+'</span></div>',

    c.cedula&&'<div class="irow"><span class="ir-l">Cédula</span><span class="ir-v">'+c.cedula+'</span></div>',

    '<div class="dps"><div class="dps-title">Tareas — '+prog+'%</div>'+

function renderProceso(c,cfg){
  if(!c.procesoStages){c.procesoStages=cfg.procesoDefault.map((t,i)=>({text:t,status:i===0?'cur':'pending',date:'',nota:''}));save()}
  const imps=c.impulsos||[];
  return'<div class="dps"><div class="dps-title">Etapas del proceso — toca para avanzar</div>'+

    '<div style="display:flex;flex-direction:column;gap:.3rem;margin-top:.5rem">'+
    '<input class="mini-inp" type="text" id="ps-in" placeholder="Agregar etapa del proceso..." style="margin-bottom:0"/>'+
    '<div style="display:flex;gap:.4rem"><input class="mini-inp" type="date" id="ps-date" style="flex:1;margin-bottom:0"/><input class="mini-inp" type="text" id="ps-nota" placeholder="Nota breve (opcional)" style="flex:2;margin-bottom:0"/><button class="mini-btn" id="add-ps-btn">+</button></div>'+
    '</div></div>'+
    '<div class="dps"><div class="dps-title">📤 Impulsos y pendientes procesales</div>'+
    (imps.map((imp,i)=>'<label class="ck '+(imp.done?'done':'')+'"><input type="checkbox" '+(imp.done?'checked':'')+' data-imp="'+i+'"/> '+imp.text+'<button data-rimp="'+i+'" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:.75rem;margin-left:auto">✕</button></label>').join('')||'<div style="font-size:.76rem;color:var(--muted);margin-bottom:.5rem">Sin impulsos</div>')+
    '<div style="display:flex;gap:.4rem;margin-top:.4rem"><input class="mini-inp" type="text" id="imp-in" placeholder="Ej: Enviar memorial de impulso..." style="flex:1;margin-bottom:0"/><button class="mini-btn" id="add-imp-btn">+</button></div></div>';
}

function renderHonorarios(c){
  const hs=c.honorarios||[];
  const total=Number(c.totalHonorarios||0);
  const paid=hs.filter(h=>h.status==='paid').reduce((a,h)=>a+Number(h.amount||0),0);
  const partial=hs.filter(h=>h.status==='partial').reduce((a,h)=>a+Number(h.amount||0),0);
  const totalPagado=paid+partial;
  const pending=Math.max(0,total-totalPagado);
  const pct=total>0?Math.min(100,Math.round(totalPagado/total*100)):0;
  const progColor=pct===100?'#16a34a':pct>50?'#b45309':'#b8924a';
  const tipoH=c.tipoHonorarios||'consulta';
  let alertHTML='';
  if(pending===0&&total>0)alertHTML='<div class="honor-alert ha-ok">✅ Honorarios completamente pagados</div>';
  else if(totalPagado===0&&total>0)alertHTML='<div class="honor-alert ha-warn">⏳ Sin pagos — total: '+fmt(total)+'</div>';
  else if(pending>0)alertHTML='<div class="honor-alert ha-debt">💰 Saldo pendiente: '+fmt(pending)+'</div>';
  return alertHTML+
    '<div class="dps"><div class="dps-title">Tipo de cliente</div>'+
    '<div class="tipo-toggle"><button class="tipo-btn '+(tipoH==='consulta'?'active':'')+'" data-tipo="consulta">Solo consulta</button><button class="tipo-btn '+(tipoH==='proceso'?'active':'')+'" data-tipo="proceso">Proceso activo</button></div>'+
    (tipoH==='proceso'&&total>0?'<div class="contract-block"><strong>Contrato de prestación de servicios</strong>Total: <strong>'+fmt(total)+'</strong>'+(c.formaPago?'<br>Forma de pago: <strong>'+c.formaPago+'</strong>':'')+'<div style="margin-top:.4rem;font-size:.7rem;color:var(--muted)">Registra cada cuota abajo con su valor y fecha exacta.</div></div>':'')+
    '</div>'+
    '<div class="dps"><div class="dps-title">Resumen financiero</div>'+
    '<div class="hprog-label"><span>Progreso de pago</span><span>'+pct+'%</span></div>'+
    '<div class="hprog"><div class="hprog-fill" style="width:'+pct+'%;background:'+progColor+'"></div></div>'+
    '<div class="honor-sum">'+
    '<div class="hs" style="background:var(--cream)"><div class="hs-n">'+fmt(total)+'</div><div class="hs-l" style="color:var(--muted)">Total acordado</div></div>'+
    '<div class="hs" style="background:var(--green-bg)"><div class="hs-n" style="color:var(--green)">'+fmt(totalPagado)+'</div><div class="hs-l" style="color:var(--green)">✓ Pagado</div></div>'+
    '<div class="hs" style="background:var(--red-bg)"><div class="hs-n" style="color:var(--red)">'+fmt(pending)+'</div><div class="hs-l" style="color:var(--red)">Pendiente</div></div>'+
    '</div>'+
    '<div style="margin-top:.5rem"><label style="font-size:.62rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.25rem">Editar total acordado (COP)</label>'+
    '<div style="display:flex;gap:.4rem"><input class="mini-inp" type="number" id="edit-total" value="'+total+'" style="flex:1;margin-bottom:0"/><button class="mini-btn" id="save-total-btn">Actualizar</button></div></div>'+
    '</div>'+
    '<div class="dps"><div class="dps-title">Movimientos</div>'+
    '<div class="mov-list">'+(hs.length?hs.map((h,i)=>'<div class="mov-item"><div style="flex:1"><div class="mov-concept">'+h.concept+'</div><div class="mov-date">'+(h.fecha||'')+'</div></div><div class="mov-amount">'+fmt(h.amount)+'</div><span class="mov-status ms-'+h.status+'">'+(h.status==='paid'?'Pagado':h.status==='partial'?'Abono':'Pendiente')+'</span><button class="del-btn" data-delmov="'+i+'">✕</button></div>').join(''):'<div style="font-size:.76rem;color:var(--muted)">Sin movimientos</div>')+'</div>'+
    '<div class="add-mov-form">'+
    '<div class="form-grid">'+
    '<div class="fg"><label>Concepto</label><input type="text" id="h-concept" placeholder="Anticipo, Cuota 1, Cuota 2..."/></div>'+
    '<div class="fg"><label>Fecha</label><input type="date" id="h-fecha" value="'+today()+'"/></div>'+
    '<div class="fg"><label>Valor (COP)</label><input type="number" id="h-amount" placeholder="600000"/></div>'+
    '<div class="fg"><label>Estado</label><select id="h-status"><option value="paid">Pagado</option><option value="unpaid">Pendiente</option><option value="partial">Abono</option></select></div>'+
    '</div>'+
    '<button class="mini-btn" id="add-mov-btn" style="width:100%">+ Registrar pago / cobro</button>'+
    '</div></div>';
}

function renderNotas(c){
  const docs=c.docs||[];
  return'<div class="dps"><div class="dps-title">Notas del caso</div>'+
    '<textarea class="notes-ta" id="dp-notes" placeholder="Estrategia, observaciones, próximos pasos...">'+(c.notes||'')+'</textarea>'+
    '<button class="mini-btn" id="save-notes-btn" style="margin-top:.4rem;width:100%">Guardar notas</button>'+
    '</div>'+
    '<div class="dps"><div class="dps-title">Documentos pendientes de recibir</div>'+
    (docs.map((d,i)=>'<label class="ck '+(d.done?'done':'')+'"><input type="checkbox" '+(d.done?'checked':'')+' data-doc="'+i+'"/> '+d.text+'<button data-rdoc="'+i+'" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:.75rem;margin-left:auto">✕</button></label>').join('')||'<div style="font-size:.76rem;color:var(--muted);margin-bottom:.5rem">Sin documentos pendientes</div>')+
    '<div style="display:flex;gap:.4rem;margin-top:.4rem"><input class="mini-inp" type="text" id="doc-in" placeholder="Ej: Registro civil, escritura..." style="flex:1;margin-bottom:0"/><button class="mini-btn" id="add-doc-btn">+</button></div>'+
    '</div>';
}

function bindDP(c,cfg){
  // tasks
  document.querySelectorAll('[data-task]').forEach(el=>el.addEventListener('change',function(){const i=Number(this.dataset.task);c.doneTasks=c.doneTasks||[];if(this.checked&&!c.doneTasks.includes(i))c.doneTasks.push(i);else if(!this.checked)c.doneTasks=c.doneTasks.filter(x=>x!==i);save();renderDetail()}));
  // stage buttons
  document.querySelectorAll('[data-stid]').forEach(el=>el.onclick=function(){changeStage(this.dataset.stid)});
  // edit/del
  const eb=document.getElementById('editBtn');if(eb)eb.onclick=function(){const id=detailId;openModal(id)};
  const db=document.getElementById('delBtn');if(db)db.onclick=function(){if(confirm('¿Eliminar este cliente?')){clients=clients.filter(x=>x.id!==detailId);save();closeDetail();renderBoard()}};
  // proceso
  document.querySelectorAll('[data-ps]').forEach(el=>el.onclick=function(){cycleProceso(Number(this.dataset.ps))});
  document.querySelectorAll('[data-rps]').forEach(el=>el.onclick=function(e){e.stopPropagation();c.procesoStages.splice(Number(this.dataset.rps),1);save();renderDetail()});
  const addPs=document.getElementById('add-ps-btn');
  if(addPs)addPs.onclick=function(){const inp=document.getElementById('ps-in'),d=document.getElementById('ps-date'),n=document.getElementById('ps-nota');if(!inp?.value.trim())return;c.procesoStages=c.procesoStages||[];c.procesoStages.push({text:inp.value.trim(),status:'pending',date:d?.value||'',nota:n?.value||''});addTL(c,'Etapa agregada: "'+inp.value.trim()+'"');inp.value='';if(d)d.value='';if(n)n.value='';save();renderDetail()};
  // impulsos
  document.querySelectorAll('[data-imp]').forEach(el=>el.addEventListener('change',function(){c.impulsos[Number(this.dataset.imp)].done=this.checked;save();renderDetail()}));
  document.querySelectorAll('[data-rimp]').forEach(el=>el.onclick=function(e){e.stopPropagation();c.impulsos.splice(Number(this.dataset.rimp),1);save();renderDetail()});
  const addImp=document.getElementById('add-imp-btn');
  if(addImp)addImp.onclick=function(){const inp=document.getElementById('imp-in');if(!inp?.value.trim())return;c.impulsos=c.impulsos||[];c.impulsos.push({text:inp.value.trim(),done:false});inp.value='';save();renderDetail()};
  // honorarios tipo
  document.querySelectorAll('[data-tipo]').forEach(el=>el.onclick=function(){c.tipoHonorarios=this.dataset.tipo;save();renderDetail()});
  // edit total
  const st=document.getElementById('save-total-btn');
  if(st)st.onclick=function(){const v=document.getElementById('edit-total')?.value;if(v==='')return;c.totalHonorarios=Number(v);addTL(c,'Total de honorarios actualizado a '+fmt(v));save();renderDetail();renderBoard()};
  // add mov
  const addMov=document.getElementById('add-mov-btn');
  if(addMov)addMov.onclick=function(){const concept=document.getElementById('h-concept')?.value.trim(),amount=document.getElementById('h-amount')?.value,status=document.getElementById('h-status')?.value,fecha=document.getElementById('h-fecha')?.value;if(!concept||!amount){alert('Completa concepto y valor');return}c.honorarios=c.honorarios||[];c.honorarios.push({concept,amount:Number(amount),status,fecha});addTL(c,'Pago: '+concept+' — '+fmt(amount)+' ('+( status==='paid'?'Pagado':status==='partial'?'Abono':'Pendiente')+')');document.getElementById('h-concept').value='';document.getElementById('h-amount').value='';save();renderDetail();renderBoard()};
  // del mov
  document.querySelectorAll('[data-delmov]').forEach(el=>el.onclick=function(){if(!confirm('¿Eliminar?'))return;c.honorarios.splice(Number(this.dataset.delmov),1);save();renderDetail();renderBoard()});
  // notas
  const sn=document.getElementById('save-notes-btn');if(sn)sn.onclick=function(){c.notes=document.getElementById('dp-notes')?.value||'';save();this.textContent='✓ Guardado';setTimeout(()=>{this.textContent='Guardar notas'},1500)};
  // docs
  document.querySelectorAll('[data-doc]').forEach(el=>el.addEventListener('change',function(){c.docs[Number(this.dataset.doc)].done=this.checked;save();renderDetail()}));
  document.querySelectorAll('[data-rdoc]').forEach(el=>el.onclick=function(e){e.stopPropagation();c.docs.splice(Number(this.dataset.rdoc),1);save();renderDetail()});
  const addDoc=document.getElementById('add-doc-btn');if(addDoc)addDoc.onclick=function(){const inp=document.getElementById('doc-in');if(!inp?.value.trim())return;c.docs=c.docs||[];c.docs.push({text:inp.value.trim(),done:false});inp.value='';save();renderDetail()};
}

function copyPortalMsg(id){
  const c=clients.find(x=>x.id===id);if(!c)return;
  const msg='Hola '+c.nombre.split(' ')[0]+' 👋\n\nTe comparto el acceso a tu portal de seguimiento de proceso:\n\n🔗 '+window.location.href.replace('crm-ccjuristas.html','portal-cliente.html')+'\n\n📋 Usuario: '+( c.cedula||'Tu cédula')+'\n🔑 PIN: '+(c.pin||'—')+'\n\nAhí podrás ver el estado actualizado de tu caso en cualquier momento.\n\n— Abogada Carol Castaño\nCC Juristas & Asociados';
  navigator.clipboard.writeText(msg).then(()=>alert('✓ Mensaje copiado. Pégalo en WhatsApp al cliente.')).catch(()=>{const ta=document.createElement('textarea');ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('✓ Mensaje copiado.')});
}

function changeStage(sid){
  const c=clients.find(x=>x.id===detailId);if(!c||!sid)return;
  const cfg=TABS[c.tab];
  const old=cfg.stages.find(s=>s.id===c.etapa),nw=cfg.stages.find(s=>s.id===sid);
  if(!nw)return;
  c.etapa=sid;c.doneTasks=[];
  addTL(c,'Etapa: "'+old?.label+'" → "'+nw?.label+'"');
  save();renderDetail();renderBoard();
}
function cycleProceso(i){
  const c=clients.find(x=>x.id===detailId);
  const cycle={pending:'cur',cur:'done',done:'pending'};
  c.procesoStages[i].status=cycle[c.procesoStages[i].status]||'pending';
  if(c.procesoStages[i].status==='done')c.procesoStages[i].date=todayLocal();
  else if(c.procesoStages[i].status==='cur')c.procesoStages[i].date='';
  save();renderDetail();
}
function addTL(c,text){c.timeline=c.timeline||[];c.timeline.unshift({text,date:todayLocal()})}

// ── MODAL ─────────────────────────────────────────────────
function openModal(id=null){
  editingId=id;
  const cfg=TABS[currentTab];
  document.getElementById('modalTitle').textContent=id?'Editar cliente':'Nuevo cliente';
  document.getElementById('f-svc').innerHTML='<option value="">Selecciona...</option>'+cfg.services.map(s=>'<option value="'+s+'">'+s+'</option>').join('');
  document.getElementById('f-etapa').innerHTML=cfg.stages.map(s=>'<option value="'+s.id+'">'+s.label+'</option>').join('');
  if(id){
    const c=clients.find(x=>x.id===id);
    if(!c)return;
    document.getElementById('f-nombre').value=c.nombre||'';
    document.getElementById('f-cedula').value=c.cedula||'';
    document.getElementById('f-wa').value=c.wa||'';
    document.getElementById('f-email').value=c.email||'';
    document.getElementById('f-pais').value=c.pais||'';
    document.getElementById('f-svc').value=c.servicio||'';
    document.getElementById('f-etapa').value=c.etapa||'';
    document.getElementById('f-desc').value=c.desc||'';
    document.getElementById('f-prior').value=c.prioridad||'normal';
    document.getElementById('f-fecha').value=c.fecha||'';
    document.getElementById('f-urg').value=c.urgencia||'';
    document.getElementById('f-tipo-h').value=c.tipoHonorarios||'consulta';
    document.getElementById('f-honor').value=c.totalHonorarios||'';
    document.getElementById('f-fpago').value=c.formaPago||'';
  } else {
    ['f-nombre','f-cedula','f-wa','f-email','f-pais','f-desc','f-urg','f-honor','f-fpago'].forEach(i=>{const el=document.getElementById(i);if(el)el.value=''});
    document.getElementById('f-prior').value='normal';
    document.getElementById('f-fecha').value=today();
    document.getElementById('f-tipo-h').value='consulta';
  }
  document.getElementById('mo').classList.remove('hidden');
}
function closeModal(){document.getElementById('mo').classList.add('hidden');editingId=null}

document.getElementById('saveBtn').addEventListener('click',function(){
  const nombre=document.getElementById('f-nombre').value.trim();
  if(!nombre){alert('El nombre es obligatorio');return}
  const tipoH=document.getElementById('f-tipo-h').value;
  const honorVal=document.getElementById('f-honor').value;
  const data={
    tab:currentTab,nombre,
    cedula:document.getElementById('f-cedula').value,
    wa:document.getElementById('f-wa').value,
    email:document.getElementById('f-email').value,
    pais:document.getElementById('f-pais').value,
    servicio:document.getElementById('f-svc').value,
    etapa:document.getElementById('f-etapa').value||TABS[currentTab].stages[0].id,
    desc:document.getElementById('f-desc').value,
    prioridad:document.getElementById('f-prior').value,
    fecha:document.getElementById('f-fecha').value,
    urgencia:document.getElementById('f-urg').value,
    tipoHonorarios:tipoH,
    formaPago:document.getElementById('f-fpago').value,
  };
  if(honorVal!=='')data.totalHonorarios=Number(honorVal);
  if(editingId){
    const idx=clients.findIndex(x=>x.id===editingId);
    if(idx===-1){alert('Error: cliente no encontrado');return}
    clients[idx]={...clients[idx],...data};
    save();closeModal();renderBoard();
    detailId=editingId;editingId=null;
    document.getElementById('dp').classList.add('open');renderDetail();
  } else {
    data.id=Date.now();
    data.pin=genPIN();
    data.totalHonorarios=data.totalHonorarios||(tipoH==='consulta'?100000:0);
    data.timeline=[{text:'Cliente captado — '+(data.servicio||'sin servicio'),date:todayLocal()}];
    data.doneTasks=[];data.notes='';data.honorarios=[];data.impulsos=[];data.docs=[];
    if(tipoH==='consulta')data.honorarios.push({concept:'Consulta inicial',fecha:data.fecha,amount:data.totalHonorarios,status:'unpaid'});
    clients.push(data);
    save();closeModal();renderBoard();
    editingId=null;
  }
});

renderSidebar();renderBoard();
</script>
